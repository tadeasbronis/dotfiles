

# ── General ─────────────────────────────────────────────────────────────────────
set -g prefix ^A
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g mode-keys vi
set -sg escape-time 0
set -g history-limit 1000000
set -g detach-on-destroy off
set -g set-clipboard on
set -g status-position top

# ── Key bindings ─────────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Sesh
bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh


# ── Terminal ────────────────────────────────────────────────────────────────────
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# ── Plugins ──────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-floax — floating scratch session
# See: https://github.com/omerxx/tmux-floax
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-session-name 'scratch'
set -g @floax-change-path 'true'
set -g @floax-title 'scratch'

# tmux-resurrect & tmux-continuum
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# tmux-autoreload
# See: https://github.com/b0o/tmux-autoreload
set -g @plugin 'b0o/tmux-autoreload'
set -g @tmux-autoreload-configs '/Users/tadeas.bronis/.config/tmux/tmux.conf'
set -g @tmux-autoreload-entrypoints '/Users/tadeas.bronis/.config/tmux/tmux.conf'

# kubectx
set -g @plugin 'tony-sol/tmux-kubectx'

# catppuccin theme
# See: https://github.com/catppuccin/tmux
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,#[fg=#{@thm_yellow}]()#[fg=#cdd6f4],}"
set -g @catppuccin_status_modules_left "session"

set -g @catppuccin_kube_context_color '#{@thm_red}'
set -g @catppuccin_kube_namespace_color '#{@thm_sky}'

# Rounded separators for status modules (matches window rounded style)
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "all"

set -g status-left-length 100
set -g status-left ' '
set -ag status-left '#{E:@catppuccin_status_session}'
set -ag status-left ' '

set -g status-right ''
set -agF status-right '#{E:@catppuccin_status_kube}'

# ── TPM · Initialize ─────────────────────────────────────────────────────────────
# ⚠ NOTE: keep at the very bottom
# See: https://github.com/tmux-plugins/tpm/blob/master/docs/changing_plugins_install_dir.md
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
# See: https://github.com/tmux-plugins/tpm/blob/master/docs/automatic_tpm_installation.md
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
